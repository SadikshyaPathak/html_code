    <!--get used for names ,address(shows the entered data in url)-->
    <!--post is used for pw ,secret things(it doesnot shows the entered text in url)-->

      username: <input type="text" name="username" />
      password: <input type="password" name="pass" />
      <input type="submit" value="submit" />
    </form>

    <!--use radio for any option box-->
    <form action="">
        Gender: <input type="radio" >male <input type="radio" >female
    </form>
<!--to make it select only one option use name attribute with same name/value -->
<form action="">
        Gender: <input type="radio" name="gender">male <input type="radio" name="gender" >female
    </form>
